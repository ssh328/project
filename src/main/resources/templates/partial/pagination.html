<!-- PAGINATION -->
<th:block th:fragment="pagination(baseUrl, currentPage, totalPages, page)">
    <div th:if="${totalPages > 0}" class="d-flex justify-content-center mt-5">
        <nav aria-label="Page navigation">
            <ul class="pagination">

                <!-- 계산 블록 (10단위 페이징) -->
                <th:block th:with="
                    blockSize=10,
                    startPage=${((currentPage - 1) / blockSize) * blockSize + 1},
                    endPage=${(startPage + blockSize - 1) > totalPages ? totalPages : (startPage + blockSize - 1)}
                ">

                    <!-- 이전 블록 버튼 -->
                    <li class="page-item" th:classappend="${startPage > 1} ? '' : 'disabled'">
                        <a class="page-link"
                        th:href="${startPage > 1} ? @{${baseUrl}(${page}=${startPage - 1})} : '#'"
                        >이전</a>
                    </li>

                    <!-- 페이지 번호 -->
                    <li class="page-item"
                        th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                        th:classappend="${pageNum == currentPage} ? 'active' : ''">
                        <a class="page-link"
                        th:href="@{${baseUrl}(${page}=${pageNum})}"
                        th:text="${pageNum}">1</a>
                    </li>

                    <!-- 다음 블록 버튼 -->
                    <li class="page-item" th:classappend="${endPage < totalPages} ? '' : 'disabled'">
                        <a class="page-link"
                        th:href="${endPage < totalPages} ? @{${baseUrl}(page=${endPage + 1})} : '#'"
                        >다음</a>
                    </li>

                </th:block>

            </ul>
        </nav>
    </div>
</th:block>
