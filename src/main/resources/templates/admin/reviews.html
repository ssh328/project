<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
    <title>Admin - Reviews</title>
</head>
<body class="d-flex flex-column vh-100">

<div th:replace="~{partial/nav.html :: navbar }"></div>

<main class="container mt-5 pt-5">
    <h1 class="mb-4">리뷰 관리</h1>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>작성자</th>
                <th>대상자</th>
                <th>평점</th>
                <th>내용</th>
                <th>작성일</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="review : ${reviews.content}">
                <td th:text="${review.id}">1</td>
                <td th:text="${review.reviewer != null ? review.reviewer.username : '알 수 없음'}">작성자</td>
                <td th:text="${review.targetUser != null ? review.targetUser.username : '알 수 없음'}">대상자</td>
                <td th:text="${review.rating}">5</td>
                <td th:text="${review.content}">내용</td>
                <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</td>
                <td>
                    <button type="button" 
                            class="btn btn-sm btn-outline-danger admin-delete-review-btn"
                            th:data-review-id="${review.id}"
                            th:data-page="${currentPage}">
                        삭제
                    </button>
                </td>
            </tr>
            <tr th:if="${reviews.content.isEmpty()}">
                <td colspan="7" class="text-center text-muted">리뷰가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{ partial/pagination.html :: pagination('/admin/reviews', ${currentPage}, ${totalPages}, 'page') }"></div>
</main>

<th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
        
<script src="/js/review/reviewDelete.js"></script>
<script th:inline="javascript">
    // 관리자 페이지용 리뷰 삭제
    initReviewDelete({
        selector: '.admin-delete-review-btn',
        endpoint: (reviewId, btn) => {
            const page = btn.getAttribute('data-page');
            return `/admin/reviews/${reviewId}/delete?page=${page}`;
        },
        dataAttribute: 'data-review-id',
        confirmMessage: '정말 이 리뷰를 삭제하시겠습니까?',
        onSuccess: (reviewId, message, btn) => {
            const page = btn.getAttribute('data-page');
            const redirectUrl = `/admin/reviews?page=${page}`;
            window.location.href = redirectUrl;
            alert(message);
        },
        errorMessage: '삭제 중 오류가 발생했습니다.'
    });
</script>
</body>
</html>
