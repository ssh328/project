<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
</head>
<body class="d-flex flex-column vh-100" style="background-color: #ffffffed;">

    <div th:replace="~{ partial/nav.html::navbar }"></div>

    <main class="container mt-5 pt-5">
        <div class="container pb-5">
            <div class="row justify-content-center mt-5">
                <div class="col-lg-10">
                    <div class="shadow p-4 rounded-4 bg-white">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                            <div>
                                <h1 class="fw-bold mb-1">마이페이지</h1>
                                <div class="text-muted">계정 설정, 내 활동, 결제/정산을 한 곳에서 관리하세요.</div>
                            </div>
                        </div>

                        <hr class="my-4" style="border-top: 2px dashed;">

                        <div class="row g-3">
                            <!-- 계정/설정 -->
                            <div class="col-12 col-md-6 col-lg-4">
                                <a href="/user/setting" class="text-decoration-none">
                                    <div class="card h-100 border-0 shadow-sm rounded-4">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                                     style="width: 44px; height: 44px; background: rgba(13,110,253,0.12);">
                                                    <i class="fa-solid fa-gear text-primary"></i>
                                                </div>
                                                <div>
                                                    <div class="fw-bold text-dark">개인 설정</div>
                                                    <div class="text-muted small">프로필/보안 설정을 관리합니다.</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>

                            <!-- 나의 상품 -->
                            <div class="col-12 col-md-6 col-lg-4">
                                <a href="/user/my/posts" class="text-decoration-none">
                                    <div class="card h-100 border-0 shadow-sm rounded-4">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                                     style="width: 44px; height: 44px; background: rgba(25,135,84,0.12);">
                                                    <i class="fa-solid fa-box text-success"></i>
                                                </div>
                                                <div>
                                                    <div class="fw-bold text-dark">나의 상품</div>
                                                    <div class="text-muted small">내가 등록한 상품을 확인합니다.</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>

                            <!-- 좋아요 -->
                            <div class="col-12 col-md-6 col-lg-4">
                                <a href="/user/my/likes" class="text-decoration-none">
                                    <div class="card h-100 border-0 shadow-sm rounded-4">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                                     style="width: 44px; height: 44px; background: rgba(220,53,69,0.12);">
                                                    <i class="fa-solid fa-heart text-danger"></i>
                                                </div>
                                                <div>
                                                    <div class="fw-bold text-dark">좋아요</div>
                                                    <div class="text-muted small">찜한 상품 목록을 봅니다.</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>

                            <!-- 최근 본 상품 -->
                            <div class="col-12 col-md-6 col-lg-4">
                                <a href="/recent-posts" class="text-decoration-none">
                                    <div class="card h-100 border-0 shadow-sm rounded-4">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                                     style="width: 44px; height: 44px; background: rgba(13,202,240,0.12);">
                                                    <i class="fa-regular fa-clock text-info"></i>
                                                </div>
                                                <div>
                                                    <div class="fw-bold text-dark">최근 본 상품</div>
                                                    <div class="text-muted small">최근에 본 상품을 다시 확인합니다.</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>

                            <!-- 구매 내역 -->
                            <div class="col-12 col-md-6 col-lg-4">
                                <a href="/escrow/buy" class="text-decoration-none">
                                    <div class="card h-100 border-0 shadow-sm rounded-4">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                                     style="width: 44px; height: 44px; background: rgba(102,16,242,0.12);">
                                                    <i class="fa-solid fa-bag-shopping" style="color: rgb(102,16,242);"></i>
                                                </div>
                                                <div>
                                                    <div class="fw-bold text-dark">구매 내역</div>
                                                    <div class="text-muted small">내가 구매한 에스크로 주문을 봅니다.</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>

                            <!-- 판매 내역 -->
                            <div class="col-12 col-md-6 col-lg-4">
                                <a href="/escrow/sell" class="text-decoration-none">
                                    <div class="card h-100 border-0 shadow-sm rounded-4">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                                     style="width: 44px; height: 44px; background: rgba(255,193,7,0.18);">
                                                    <i class="fa-solid fa-store text-warning"></i>
                                                </div>
                                                <div>
                                                    <div class="fw-bold text-dark">판매 내역</div>
                                                    <div class="text-muted small">내가 판매한 에스크로 주문을 봅니다.</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>

                            <!-- 정산 내역 -->
                            <div class="col-12">
                                <a href="/escrow/settlements" class="text-decoration-none">
                                    <div class="card border-0 shadow-sm rounded-4">
                                        <div class="card-body p-4">
                                            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                                                <div class="d-flex align-items-center gap-3">
                                                    <div class="rounded-3 d-flex align-items-center justify-content-center"
                                                         style="width: 44px; height: 44px; background: rgba(32,201,151,0.14);">
                                                        <i class="fa-solid fa-coins" style="color: rgb(32,201,151);"></i>
                                                    </div>
                                                    <div>
                                                        <div class="fw-bold text-dark">정산 내역</div>
                                                        <div class="text-muted small">가상 지갑 잔액과 정산 내역을 확인합니다.</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
