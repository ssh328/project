<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
</head>
<body class="d-flex flex-column vh-100" style="background-color: #ffffffed;">
<div th:replace="~{ partial/nav.html::navbar }"></div>

<main class="container mt-5 pt-5">
    <div class="container pb-5">
        <div class="row justify-content-center mt-5 g-3">
            <div class="col-lg-4">
                <div class="shadow p-4 rounded-4 bg-white">
                    <h4 class="fw-bold mb-3">가상 지갑(정산)</h4>
                    <div class="fs-3 fw-bold">
                        <span th:text="${wallet != null ? #numbers.formatInteger(wallet.balance, 0, 'COMMA') : '0'}">0</span>원
                    </div>
                    <div class="text-muted small">구매확정 시 판매자에게 정산금이 적립됩니다.</div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="shadow p-4 rounded-4 bg-white">
                    <h4 class="fw-bold mb-3">정산 내역</h4>
                    <div th:if="${settlements.size() == 0}" class="text-muted">정산 내역이 없습니다.</div>
                    <div th:each="s : ${settlements}" class="border rounded-3 p-3 mb-2">
                        <div class="d-flex align-items-center gap-3">
                            <img th:if="${s.order.post.images != null and !s.order.post.images.isEmpty()}" 
                                 th:src="${s.order.post.images[0].imgUrl}" 
                                 class="rounded" 
                                 style="width: 80px; height: 80px; object-fit: cover; flex-shrink: 0;" 
                                 alt="상품 이미지">
                            <img th:unless="${s.order.post.images != null and !s.order.post.images.isEmpty()}" 
                                 src="https://placehold.co/300" 
                                 class="rounded" 
                                 style="width: 80px; height: 80px; object-fit: cover; flex-shrink: 0;" 
                                 alt="기본 이미지">
                            <div class="flex-grow-1">
                                <div class="fw-semibold mb-1" th:text="|상품명: ${s.order.orderName}|"></div>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="text-muted small">수수료: <span th:text="${#numbers.formatInteger(s.feeAmount, 0, 'COMMA')}">0</span>원</div>
                                    <div class="fw-bold">정산: <span th:text="${#numbers.formatInteger(s.netAmount, 0, 'COMMA')}">0</span>원</div>
                                    <span class="badge rounded-pill bg-success" th:text="${s.status.description}">정산상태</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

</body>
</html>
