<th:block th:fragment="offcanvas">
    <button class="btn btn-outline-primary mb-3" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasWithBothOptions" aria-controls="offcanvasWithBothOptions">
            필터
    </button>

    <div class="offcanvas offcanvas-start" data-bs-scroll="true" tabindex="-1" id="offcanvasWithBothOptions"
        aria-labelledby="offcanvasWithBothOptionsLabel">
        <div class="offcanvas-header pb-0">
            <h3 class="offcanvas-title fw-bold" id="offcanvasWithBothOptionsLabel">필터</h3>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <hr>
        <div class="offcanvas-body pt-1">
            <div class="d-flex justify-content-end mb-3">
                <a th:href="@{/post/list}">초기화</a>
            </div>

            <h5 class="fw-bold">카테고리</h5>
            <form id="filterForm" th:action="@{/post/list}" method="get">
                <div th:each="categoryItem, iterStat : ${categories}" class="form-check">
                    <input class="form-check-input category_radio"
                        type="radio"
                        name="category"
                        th:id="'category_' + ${iterStat.index}"
                        th:value="${categoryItem}"
                        th:checked="${selectedCategory} == ${categoryItem}">
                    <label class="form-check-label mb-1"
                        th:for="'category_' + ${iterStat.index}"
                        th:text="${categoryItem}">
                    </label>
                </div>

                <hr class="my-4">

                <h5 class="fw-bold">정렬</h5>
                <div class="form-check">
                    <input class="form-check-input"
                        type="radio"
                        name="sort_by"
                        id="recent_radio"
                        value="recent"
                        th:checked="${selectedSort} == null or ${selectedSort} == 'recent'">
                    <label class="form-check-label mb-1" for="recent_radio">
                        최신순
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                        type="radio"
                        name="sort_by"
                        id="popular_radio"
                        value="hottest"
                        th:checked="${selectedSort} == 'hottest'">
                    <label class="form-check-label mb-1" for="popular_radio">
                        인기순
                    </label>
                </div>

                <hr class="my-4">

                <h5 class="fw-bold">가격</h5>
                <div class="row align-items-center mb-3">
                    <div class="col-5 px-0">
                        <input class="form-control form-control-sm"
                            type="number"
                            name="start_price"
                            aria-label="startPrice"
                            th:value="${selectedStartPrice}">
                    </div>
                    <div class="col-auto">
                        <p class="my-1">-</p>
                    </div>
                    <div class="col-5 px-0">
                        <input class="form-control form-control-sm"
                            type="number"
                            name="end_price"
                            aria-label="endPrice"
                            th:value="${selectedEndPrice}">
                    </div>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-outline-primary">적용하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ✅ 비어 있는 입력 필드는 전송 전에 자동으로 제거하는 스크립트 -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const filterForm = document.getElementById("filterForm");

            if (filterForm) {
                filterForm.addEventListener("submit", function() {
                    const inputs = filterForm.querySelectorAll("input[name]");
                    inputs.forEach(input => {
                        if (input.type === "number" && input.value.trim() === "") {
                            input.removeAttribute("name"); // 이름 제거 → URL에서 제외됨
                        }
                    });
                });
            }
        });
    </script>
</th:block>
