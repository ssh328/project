<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
</head>
<body class="d-flex flex-column vh-100">

    <div th:replace="~{ nav.html::navbar }"></div>

    <main class="container mt-5 pt-5">
        <div class="container pb-5">
            <div class="row d-flex align-items-center justify-content-center mt-5">

                <h1 class="text-center text-muted">비밀번호 변경</h1>

                <!-- 인증 실패 시 표시 -->
                <div th:if="${errorMessage}">
                    <div class="alert alert-warning text-center">
                        <strong th:text="${errorMessage}"></strong>
                    </div>
                    <a href="/user/verify-password" class="btn btn-outline-primary w-100">본인 인증하러 가기</a>
                </div>

                <!-- 인증 완료 시 표시 -->
                <form th:if="${#strings.isEmpty(errorMessage)}"
                      th:action="@{/user/change-password}"
                      method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <p>새로운 비밀번호를 입력해주세요.</p>

                    <div class="mb-3">
                        <input type="password" class="form-control" name="newPassword" placeholder="New Password" required>
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-outline-primary w-100">비밀번호 변경</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
