<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="partial/header.html :: headerfrag"></th:block>
</head>

<body class="d-flex flex-column vh-100">

    <div th:replace="~{ nav.html::navbar }"></div>

    <main class="container mt-5">
        <div class="container-fluid d-flex align-items-center justify-content-center mt-5 pt-5">
            <div class="col-md-6 col-lg-6">
                <h1 class="display-2 signup-border-color mb-4" style="font-weight: 500;">Sign Up</h1>
    
                <!-- 회원가입 폼 -->
                <form th:action="@{/user-register}" method="post" class="text-center validated-form" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3 form-floating">
                        <input name="username" type="text" class="form-control" id="floatingName" placeholder="Username" required>
                        <label for="floatingName">Username</label>
                        <div class="invalid-feedback">Username을 입력해주세요.</div>
                    </div>

                    <div class="mb-3 form-floating">
                        <input name="email" type="email" class="form-control" id="floatingEmail" placeholder="Email" required>
                        <label for="floatingEmail">Email</label>
                        <div class="invalid-feedback">이메일을 입력해주세요.</div>
                    </div>

                    <div class="mb-3 form-floating">
                        <input name="user_id" type="text" class="form-control" id="floatingUserId" placeholder="아이디" required>
                        <label for="floatingUserId">아이디</label>
                        <div class="invalid-feedback">아이디를 입력해주세요.</div>
                    </div>
    
                    <div class="mb-3 form-floating">
                        <input name="password" type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                        <label for="floatingPassword">Password</label>
                        <div class="invalid-feedback">비밀번호를 입력해주세요.</div>
                    </div>
    
                    <div class="mb-3">
                        <button type="submit" class="btn btn-outline-primary w-100">Sign Up</button>
                    </div>
    
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="partial/footer.html :: footerFragment"></th:block>

    <!-- 부트스트랩 유효성 검사 -->
    <script>
        (() => {
            'use strict';
            const form = document.querySelector('.validated-form');
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
