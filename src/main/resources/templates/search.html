<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
</head>

<body class="d-flex flex-column vh-100">
    <div th:replace="~{ nav.html::navbar }"></div>
    <main class="container mt-5 pt-5">
        <!-- 검색창 추가 -->
        <div th:replace="~{ partial/search-bar.html::searchbar }"></div>

        <!--카드-->
        <div class="row row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-3 mb-5">
            <div class="col" th:each="post : ${posts.content}">
                <th:block th:replace="~{partial/post-card.html :: postCard(${post}, ${likedPostIds})}"></th:block>
            </div>
        </div>
    </main>

    <!-- 게시글 없을 때 메시지 표시 -->
    <div th:if="${totalPages == 0}" class="text-center my-5 text-muted">
        <i class="fa-solid fa-magnifying-glass fa-2x mb-3"></i>
        <p>‘<span th:text="${searchText}"></span>’에 대한 검색 결과가 없습니다.</p>
    </div>

    <!-- 게시글 있을 때만 페이지네이션 표시 -->
    <div th:replace="~{ partial/pagination.html :: pagination('/post/search?searchText=' + ${searchText}, ${currentPage}, ${totalPages}, 'page') }"></div>

    <th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

    <script src="/js/like.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
