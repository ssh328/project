<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
    <title>Admin - Users</title>
</head>
<body class="d-flex flex-column vh-100">

<div th:replace="~{partial/nav.html :: navbar }"></div>

<main class="container mt-5 pt-5">
    <h1 class="mb-4">사용자 관리</h1>

    <form class="row g-2 mb-3" method="get" th:action="@{/admin/users}">
        <div class="col-sm-4 col-md-3">
            <input type="text" class="form-control" name="keyword"
                   placeholder="이름 / 이메일 검색"
                   th:value="${keyword}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">검색</button>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/users}" class="btn btn-outline-secondary">초기화</a>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>아이디</th>
                <th>이름</th>
                <th>이메일</th>
                <th>역할</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users.content}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.user_id}">userid</td>
                <td th:text="${user.username}">name</td>
                <td th:text="${user.email}">email</td>
                <td th:text="${user.role}">ROLE_USER</td>
            </tr>
            <tr th:if="${users.content.isEmpty()}">
                <td colspan="5" class="text-center text-muted">사용자가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{ partial/pagination.html :: pagination('/admin/users', ${currentPage}, ${totalPages}, 'page') }"></div>
</main>

<th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
