<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
    <title>Admin - Posts</title>
</head>
<body class="d-flex flex-column vh-100">

<div th:replace="~{ nav.html::navbar }"></div>

<main class="container mt-5 pt-5">
    <h1 class="mb-4">게시글 관리</h1>

    <form class="row g-2 mb-3" method="get" th:action="@{/admin/posts}">
        <div class="col-sm-4 col-md-3">
            <input type="text" class="form-control" name="keyword"
                   placeholder="제목 검색"
                   th:value="${keyword}">
        </div>
        <div class="col-sm-3 col-md-2">
            <select class="form-select" name="category">
                <option value="" th:selected="${category == null or category == ''}">전체 카테고리</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat}"
                        th:text="${cat}"
                        th:selected="${category == cat}">카테고리</option>
            </select>
        </div>
        <div class="col-sm-3 col-md-2">
            <select class="form-select" name="status">
                <option value="" th:selected="${status == null or status == ''}">전체 상태</option>
                <option th:each="s : ${statuses}"
                        th:value="${s.name()}"
                        th:text="${s.description}"
                        th:selected="${status == s.name()}">ON_SALE</option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">검색</button>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/posts}" class="btn btn-outline-secondary">초기화</a>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>제목</th>
                <th>가격</th>
                <th>카테고리</th>
                <th>상태</th>
                <th>작성자</th>
                <th>조회수</th>
                <th>좋아요</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="post : ${posts.content}">
                <td th:text="${post.id}">1</td>
                <td>
                    <a th:href="@{|/post/detail/${post.id}|}" th:text="${post.title}" target="_blank">title</a>
                </td>
                <td th:text="${#numbers.formatInteger(post.price, 0, 'COMMA')} + '원'">0원</td>
                <td th:text="${post.category}">카테고리</td>
                <td th:text="${post.status}">ON_SALE</td>
                <td th:text="${post.user != null ? post.user.username : '알 수 없음'}">user</td>
                <td th:text="${post.viewCount}">0</td>
                <td th:text="${post.likeCnt}">0</td>
                <td>
                    <form th:action="@{|/admin/posts/${post.id}/delete|}" method="post"
                          th:object="${post}">
                        <input type="hidden" name="page" th:value="${currentPage}">
                        <input type="hidden" name="keyword" th:value="${keyword}">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('정말 이 게시글을 삭제하시겠습니까?');">
                            삭제
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${posts.content.isEmpty()}">
                <td colspan="9" class="text-center text-muted">게시글이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{ partial/pagination.html :: pagination('/admin/posts', ${currentPage}, ${totalPages}, 'page') }"></div>
</main>

<th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
