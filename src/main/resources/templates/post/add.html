<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
</head>

<body class="d-flex flex-column vh-100">

    <div th:replace="~{ partial/nav.html::navbar }"></div>

    <!-- 메인 콘텐츠 -->
    <main class="container mt-5 pt-5">

        <div class="text-danger text-center">
            <th:block th:replace="~{ partial/flash.html :: flashMessages }"></th:block>
        </div>

        <form id="postForm" action="/post/add" method="POST" novalidate class="validated-form">
            <input type="hidden" th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}">

            <div class="container pb-5" style="max-width: 795px;">
                <div class="row d-flex align-items-center justify-content-center mt-5 px-3">

                    <!-- 제목 -->
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">제목</label>
                        <input type="text" id="title" name="title" class="form-control" placeholder="글 제목" required>
                        <div class="invalid-feedback">제목을 입력해주세요.</div>
                    </div>

                    <!-- 가격 -->
                    <div class="mb-3">
                        <label for="formPrice" class="form-label fw-bold">가격</label>
                        <div class="input-group">
                            <span class="input-group-text">₩</span>
                            <input type="number" id="formPrice" name="price" class="form-control"
                                   min="0"
                                   max="999999999"
                                   placeholder="가격을 입력해주세요." required>
                            <div class="invalid-feedback">가격을 입력해주세요.</div>
                        </div>
                    </div>

                    <!-- 카테고리 -->
                    <div class="mb-3">
                        <label for="category" class="form-label fw-bold">카테고리</label>
                        <select name="category" class="form-select" id="category" required>
                            <option value="" disabled selected>카테고리를 선택하세요</option>
                            <option th:each="c : ${categories}" 
                                    th:value="${c}" 
                                    th:text="${c}"></option>
                        </select>
                        <div class="invalid-feedback">카테고리를 선택해주세요.</div>
                    </div>

                    <!-- 사진 선택 -->
                    <div class="mb-3">
                        <label for="formFileMultiple" class="form-label fw-bold">사진 선택</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="fileNameInput" placeholder="선택된 파일 이름이 여기에 표시됩니다" readonly>
                            <input type="file" name="files" class="form-control" id="formFileMultiple" multiple style="display: none;" required>
                            <button type="button" class="btn btn-outline-primary" id="selectFilesButton">파일 선택</button>
                        </div>
                        <div id="file-invalid-feedback" class="invalid-feedback">사진을 최소 1개 선택해주세요.</div>
                        <small id="fileCountMessage" class="text-muted">최대 10개의 파일을 선택할 수 있습니다.</small>
                        <input type="hidden" name="image" id="image-url">
                    </div>

                    <!-- 내용 -->
                    <div class="mb-3">
                        <label for="textarea" class="form-label fw-bold">내용</label>
                        <textarea id="body" name="body" class="form-control" rows="5"
                                  minlength="10"
                                  maxlength="10000"
                                  required></textarea>
                        <div class="invalid-feedback">내용을 입력해주세요.</div>
                    </div>

                    <!-- 제출 버튼 -->
                    <div class="d-flex justify-content-end">
                        <button id="saveButton" class="btn btn-outline-primary">Submit</button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <!-- 하단 푸터 -->
    <th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

    <script src="/js/postForm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
