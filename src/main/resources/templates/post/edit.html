<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
</head>

<body class="d-flex flex-column vh-100">

    <div th:replace="~{ partial/nav.html::navbar }"></div>

    <main class="container mt-5 pt-5">
        <form id="editForm" action="/post/edit" method="POST" novalidate class="validated-form">
            <input type="hidden" th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}">

            <input type="hidden" name="postId" th:value="${data.id}">

            <div class="container pb-5" style="max-width: 795px;">
                <div class="row d-flex align-items-center justify-content-center mt-5 px-3">

                    <!-- 제목 -->
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">제목</label>
                        <input type="text" id="title" name="title" class="form-control" th:value="${data.title}" required>
                        <div class="invalid-feedback">제목을 입력해주세요.</div>
                    </div>

                    <!-- 가격 -->
                    <div class="mb-3">
                        <label for="formPrice" class="form-label fw-bold">가격</label>
                        <div class="input-group">
                            <span class="input-group-text">₩</span>
                            <input type="text" id="formPrice" name="price" class="form-control"
                                   min="0"
                                   max="999999999"
                                   th:value="${data.price}" required>
                            <div class="invalid-feedback">가격을 입력해주세요.</div>
                        </div>
                    </div>

                    <!-- 카테고리 -->
                    <div class="mb-3">
                        <label for="category" class="form-label fw-bold">카테고리</label>
                        <select name="category" class="form-select" id="category" required>
                            <option value="" disabled selected>카테고리를 선택하세요</option>
                            <option th:each="c : ${categories}" 
                                    th:value="${c}" 
                                    th:text="${c}"
                                    th:selected="${c == data.category}">
                            </option>
                        </select>
                        <div class="invalid-feedback">카테고리를 선택해주세요.</div>
                    </div>

                    <!-- 사진 선택 -->
                    <div class="mb-3">
                        <label for="formFileMultiple" class="form-label fw-bold">사진 선택</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="fileNameInput" placeholder="추가하실 사진을 선택해주세요." readonly>
                            <input type="file" name="files" class="form-control" id="formFileMultiple" multiple style="display: none;">
                            <button type="button" class="btn btn-outline-primary" id="selectFilesButton">파일 선택</button>
                        </div>
                        <div id="file-invalid-feedback" class="invalid-feedback">사진을 최소 1개 선택해주세요.</div>
                        <small id="fileCountMessage" class="text-muted">최대 10개의 파일을 선택할 수 있습니다.</small>
                        <input type="hidden" name="image" id="image-url">
                    </div>

                    <!-- 사진 미리보기 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">사진 미리보기</label>
                        <div id="imagePreviewContainer"
                             class="d-flex gap-3 p-3 border rounded"
                             style="
                                flex-wrap: nowrap;
                                overflow-x: auto;
                                max-width: 100%;
                                white-space: nowrap;
                            ">
                    
                            <!-- 이미지가 있을 경우 -->
                            <div th:each="img : ${data.images}" 
                            class="position-relative d-inline-block"
                            style="flex: 0 0 auto;">
                                <img th:src="${img.imgUrl}"
                                        alt="미리보기"
                                        class="img-thumbnail rounded shadow-sm"
                                        style="height: 180px; width: auto; object-fit: contain; flex-shrink: 0;">

                                <!-- 삭제 버튼 -->
                                <button type="button"
                                        class="btn-close position-absolute"
                                        style="top: 6px; right: 6px; width: 26px; height: 26px; z-index: 10;"
                                        aria-label="이미지 삭제"
                                        th:attr="data-id=${img.id}">
                                </button>
                            </div>
                            <input type="hidden" name="deletedImages" id="deletedImages">
                        </div>
                        <small class="text-muted">이미지를 클릭하여 삭제할 수 있습니다.</small>
                    </div>

                    <!-- 내용 -->
                    <div class="mb-3">
                        <label for="textarea" class="form-label fw-bold">내용</label>
                        <textarea id="body" name="body" class="form-control" rows="5"
                                  minlength="10"
                                  maxlength="10000"
                                  th:text="${data.body}" required></textarea>
                        <div class="invalid-feedback">내용을 입력해주세요.</div>
                    </div>

                    <!-- 제출 버튼 -->
                    <div class="d-flex justify-content-end">
                        <button id="saveButton" class="btn btn-outline-primary">수정</button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <!-- 하단 푸터 -->
    <th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

    <!-- 서버에서 전달된 기존 이미지 목록 -->
    <script th:inline="javascript">
        const existingImages = /*[[${data.images}]]*/ [];
    </script>
    <script src="/js/editFormHandler.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
