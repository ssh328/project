<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="partial/header.html :: headerfrag"></th:block>
</head>

<body class="d-flex flex-column vh-100">

  <div th:replace="~{partial/nav.html :: navbar }"></div>

  <main class="container mt-5">
    <div class="container-fluid d-flex align-items-center justify-content-center mt-5 pt-5">
      <div class="col-md-6 col-lg-6">

        <h1 class="display-2 login-border-color mb-4" style="font-weight: 500;">Log In</h1>

        <div class="text-danger text-center">
          <th:block th:replace="~{partial/flash.html :: flashMessages}"></th:block>
        </div>

        <!-- 로그인 폼 -->
        <form id="loginForm" class="text-center" novalidate>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <div class="form-floating mb-1">
              <input name="username" id="username" type="text" class="form-control" placeholder="Username" required>
              <label for="username">Username</label>
              <div class="invalid-feedback">이메일을 입력해주세요.</div>
          </div>

          <div class="form-floating mb-3">
              <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
              <label for="password">Password</label>
              <div class="invalid-feedback">비밀번호를 입력해주세요.</div>
          </div>

          <div class="mb-1">
              <button id="saveButton" class="btn btn-outline-primary w-100">로그인</button>
          </div>
          <div>
              <a th:href="@{/register}" class="btn btn-outline-success w-100">Sign up</a>
          </div>
        </form>
      </div>
    </div>
  </main>

    <th:block th:replace="partial/footer.html :: footerFragment"></th:block>
    <script src="/js/auth/login.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
  </body>
  </html>
