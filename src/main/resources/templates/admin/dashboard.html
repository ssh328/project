<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
    <title>Admin Dashboard</title>
</head>
<body class="d-flex flex-column vh-100">

<div th:replace="~{ nav.html::navbar }"></div>

<main class="container mt-5 pt-5">
    <h1 class="mb-4">관리자 대시보드</h1>

    <div class="row g-3">
        <div class="col-sm-6 col-lg-3">
            <div class="card text-bg-primary">
                <div class="card-body">
                    <h5 class="card-title">전체 사용자</h5>
                    <p class="card-text fs-3" th:text="${stats.totalUsers}">0</p>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card text-bg-success">
                <div class="card-body">
                    <h5 class="card-title">전체 게시글</h5>
                    <p class="card-text fs-3" th:text="${stats.totalPosts}">0</p>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card text-bg-warning">
                <div class="card-body">
                    <h5 class="card-title">전체 리뷰</h5>
                    <p class="card-text fs-3" th:text="${stats.totalReviews}">0</p>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card text-bg-danger">
                <div class="card-body">
                    <h5 class="card-title">전체 좋아요</h5>
                    <p class="card-text fs-3" th:text="${stats.totalLikes}">0</p>
                </div>
            </div>
        </div>
    </div>

    <hr class="my-4">

    <div class="row g-3">
        <div class="col-md-4">
            <div class="list-group">
                <a href="/admin/users" class="list-group-item list-group-item-action">
                    사용자 관리
                </a>
                <a href="/admin/posts" class="list-group-item list-group-item-action">
                    게시글 관리
                </a>
                <a href="/admin/reviews" class="list-group-item list-group-item-action">
                    리뷰 관리
                </a>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
