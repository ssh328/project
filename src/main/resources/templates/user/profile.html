<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
    <link rel="stylesheet" href="/star.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="d-flex flex-column vh-100">

    <div th:replace="~{ partial/nav.html::navbar }"></div>

    <main class="container mt-5 pt-5">
        <div class="row d-flex align-items-center justify-content-center mt-5 px-3">
                <!-- 프로필 헤더 -->
                <div class="d-flex align-items-center mb-5">
                    <img th:src="${user.dp}" class="rounded-circle" width="100" height="100" alt="알 수 없음">
                    <h1 th:text="${user.username}" class="ms-3"></h1>
                </div>

            <!-- 탭 메뉴 -->
            <ul class="nav nav-tabs" id="myTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <a class="nav-link" 
                            id="home-tab" 
                            data-bs-target="#home-tab-pane" 
                            type="button" 
                            role="tab" 
                            aria-controls="home-tab-pane" 
                            th:classappend="${tab == 'posts'} ? 'active'" 
                            aria-selected="true"
                            th:href="@{'/user/profile/' + ${user.username} + '?tab=posts'}">판매 물품
                    </a>
                </li>

                <li class="nav-item" role="presentation">
                    <a class="nav-link" id="profile-tab" data-bs-target="#profile-tab-pane" type="button"
                       role="tab" aria-controls="profile-tab-pane" th:classappend="${tab == 'reviews'} ? 'active'"
                        aria-selected="false" 
                        th:href="@{'/user/profile/' + ${user.username} + '?tab=reviews'}">거래 후기
                    </a>
                </li>
            </ul>

            <div class="tab-content" id="myTabContent">

                <!-- 판매 물품 탭 -->
                <div th:classappend="${tab == 'posts'} ? ' show active'" class="tab-pane fade" id="home-tab-pane"
                     role="tabpanel" aria-labelledby="home-tab" tabindex="0">

                    <div class="row">
                        <!-- 게시물 카드 목록 -->
                        <div class="row row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-3 mb-5">
                            <div class="col" th:each="post : ${posts.content}">
                                <th:block th:replace="~{partial/post-card.html :: postCard(${post}, ${likedPostIds}, ${viewCounts})}"></th:block>
                            </div>
                        </div>
                        
                        <!-- 게시글이 없을 때 메시지 표시 -->
                        <div th:if="${tab == 'posts'} and ${postTotalPages == 0}"
                        class="text-center my-5 text-muted">
                            <i class="fa-solid fa-box-open fa-2x mb-3"></i>
                            <p>
                            <span th:text="${user.username}"></span> 님의 등록된 게시글이 없습니다.
                            </p>
                        </div>
    
                         <!-- 판매물품 페이지네이션 -->
                        <div id="posts-pagination"
                             th:if="${tab == 'posts'} and ${postTotalPages != null and postCurrentPage != null}"
                             th:replace="~{ partial/pagination.html :: pagination('/user/profile/' + ${user.username} + '?tab=posts', ${postCurrentPage}, ${postTotalPages}, 'postPage') }">
                        </div>
                    </div>
                </div>

                <!-- 거래 후기 탭 -->
                <div th:classappend="${tab == 'reviews'} ? ' show active'" class="tab-pane fade" id="profile-tab-pane"
                     role="tabpanel" aria-labelledby="profile-tab" tabindex="0">
                    <div class="row">
                        <div class="col-md-6">
                            <div sec:authorize="isAuthenticated()">

                                <!-- 리뷰 작성 폼 -->
                                <form th:action="@{'/review'}" method="POST" novalidate class="validated-form">
                                    <div class="mb-3">
                                        <label for="reviewText" class="form-label fw-bold mt-3">리뷰 작성</label>
                        
                                        <div class="rating-card mb-2">
                                            <div class="star-rating animated-stars">
                                                <input type="radio" id="star5" name="rating" value="5">
                                                <label for="star5" class="bi bi-star-fill"></label>
                                                <input type="radio" id="star4" name="rating" value="4">
                                                <label for="star4" class="bi bi-star-fill"></label>
                                                <input type="radio" id="star3" name="rating" value="3">
                                                <label for="star3" class="bi bi-star-fill"></label>
                                                <input type="radio" id="star2" name="rating" value="2">
                                                <label for="star2" class="bi bi-star-fill"></label>
                                                <input type="radio" id="star1" name="rating" value="1">
                                                <label for="star1" class="bi bi-star-fill"></label>
                                            </div>
                                            <p class="text-muted mt-2">별점을 선택해주세요.</p>
                                            <input id="postId" type="hidden" name="targetUserId" th:value="${user.id}">
                                        </div>
                        
                                        <textarea class="form-control" id="reviewText" rows="3" name="content"
                                                  placeholder="리뷰를 입력해주세요." required></textarea>
                                        <div class="invalid-feedback">리뷰를 입력해주세요.</div>
                                    </div>
                        
                                    <button id="saveButton" type="submit" class="btn btn-outline-primary">등록</button>
                                </form>
                            </div>
                        </div>

                        <!-- 리뷰 목록 -->
                        <div class="col-md-6 mt-3">
                            <div th:if="${tab == 'reviews'} and ${reviewTotalPages == 0}"
                                 class="text-center my-5 text-muted">
                                <i class="fa-solid fa-magnifying-glass fa-2x mb-3"></i>
                                <p>리뷰가 없습니다.</p>
                            </div>

                            <div th:each="review : ${reviews}">
                                <div class="card mb-3 position-relative">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center mb-2">
                                            <button th:if="${loginUserId == review.reviewer.id}"
                                                    type="button"
                                                    class="btn-close position-absolute"
                                                    style="top: 7px; right: 6px; width: 26px; height: 26px; z-index: 10;"
                                                    aria-label="리뷰 삭제"
                                                    th:attr="data-id=${review.id}">
                                            </button>

                                            <img th:src="${review.reviewer.dp}" class="rounded-circle"
                                                 style="width: 50px; height: 50px; object-fit: cover;" alt="알 수 없음">
                                            <div>
                                                <h5 class="ms-3" th:text="${review.reviewer.username}"></h5>
                                                <p class="card-text ms-3" th:text="'Review: ' + ${review.content}"></p>
                                            </div>
                                        </div>
                        
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div class="star-rating-container">
                                                <span th:each="i : ${#numbers.sequence(1, review.rating)}">
                                                    <i class="bi bi-star-fill" style="color: #ffc107;"></i>
                                                </span>
                                                <span th:if="${review.rating < 5}"
                                                      th:each="i : ${#numbers.sequence(1, 5 - review.rating)}">
                                                    <i class="bi bi-star-fill" style="color: #ddd;"></i>
                                                </span>
                                            </div>

                                            <span class="text-muted small mb-1"
                                                  th:text="${#temporals.format(review.createdAt, 'yyyy년 MM월 dd일 HH:mm')}"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 거래후기 페이지네이션 -->
                        <div id="reviews-pagination"
                             th:if="${tab == 'reviews'} and ${reviewTotalPages != null and reviewCurrentPage != null}"
                             th:replace="~{ partial/pagination.html :: pagination('/user/profile/' + ${user.username} + '?tab=reviews', ${reviewCurrentPage}, ${reviewTotalPages}, 'reviewPage') }">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        

    </main>

    <th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

    <script>
        //유효성 검사하도록 하는 부트스트랩 JS코드
        // Example starter JavaScript for disabling form submissions if there are invalid fields
        (() => {
            'use strict'

            const form = document.querySelector('.validated-form')
            const saveButton = document.getElementById('saveButton');

            saveButton.addEventListener('click', event => {
            if (!form.checkValidity()) {
               event.preventDefault()
               event.stopPropagation()
            }
            form.classList.add('was-validated')
            }, false)

        })()
    </script>
    <script src="/js/star.js"></script>
    <script src="/js/like.js"></script>
    <script src="/js/reviewDelete.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
