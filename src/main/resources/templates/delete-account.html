<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
</head>
<body class="d-flex flex-column vh-100">

    <div th:replace="~{ nav.html::navbar }"></div>

    <main class="container mt-5 pt-5">
        <div class="container pb-5">
            <div class="row d-flex align-items-center justify-content-center mt-5">

                <h1>계정 삭제</h1>

                <!-- 본인 인증 미완료 시 표시 -->
                <div th:if="${errorMessage}" class="text-center">
                    <div class="alert alert-warning" role="alert">
                        먼저 본인 인증을 완료해주세요.
                    </div>
                    <a href="/user/verify-password?nextAction=delete-account" class="btn btn-outline-primary w-100">
                        본인 인증하러 가기
                    </a>
                </div>

                <!-- 본인 인증 완료 시 표시 -->
                <div th:if="${#strings.isEmpty(errorMessage)}">
                    <div class="alert alert-danger text-center">
                        <strong>정말로 계정을 삭제하시겠습니까?</strong><br>
                        <small>이 작업은 되돌릴 수 없습니다.</small>
                    </div>

                    <form th:if="${#strings.isEmpty(errorMessage)}" method="post" class="text-center">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-danger btn-lg w-100 mb-2">
                            계정 삭제
                        </button>
                        <a href="/user/setting" class="btn btn-outline-secondary btn-lg w-100">
                            취소
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    <th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
