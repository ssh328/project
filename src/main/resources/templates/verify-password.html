<!doctype html>
<html lang="en">
<head>
    <th:block th:replace="~{ partial/header.html :: headerfrag }"></th:block>
</head>
<body class="d-flex flex-column vh-100">

    <div th:replace="~{ nav.html::navbar }"></div>

    <main class="container mt-5 pt-5">
        <div class="container pb-5">
            <div class="row d-flex align-items-center justify-content-center mt-5">

                <div class="text-danger text-center">
                    <th:block th:replace="~{partial/flash.html :: flashMessages}"></th:block>
                </div>

                <h1 class="text-center text-muted">본인 인증</h1>
        
                <form th:action="@{/verify-password}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <p>계속하려면 먼저 본인임을 인증하세요.</p>

                    <div class="mb-3">
                        <input type="email" class="form-control" name="email"
                                placeholder="Email" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" name="password"
                                placeholder="Password" required>
                    </div>

                    <input type="hidden" name="nextAction" th:value="${nextAction}">
                    
                    <div class="mb-3">
                        <button type="submit" class="btn btn-outline-primary">인증하기</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{ partial/footer.html :: footerFragment }"></th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
